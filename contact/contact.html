<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

  .navbar-nav .nav-item{
  margin-left: 100px;
}


    .contact-section {
      padding: 80px 0;
    }

    .contact-info {
      background: #212529;
      color: white;
      padding: 40px;
      border-radius: 10px;
      height: 100%;
    }

    .contact-info h4 {
      margin-bottom: 20px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #dc3545;
    }

    .btn-custom {
      background-color: #dc3545;
      color: white;
    }

    .btn-custom:hover {
      background-color: #bb2d3b;
    }

    .map-container iframe {
      width: 100%;
      height: 350px;
      border-radius: 10px;
    }

    footer {
      background: #212529;
      color: white;
      padding: 20px 0;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>

<body>
 


  
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">Sports</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
     <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="/index/index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="../about/about.html">Clothing</a></li>
        <li class="nav-item"><a class="nav-link" href="../contact/contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="text-muted">We would love to hear from you</p>
      </div>

      <div class="row g-4">

        <!-- Contact Form -->
        <div class="col-lg-7">
          <div class="card shadow border-0 p-4">
            <form>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Full Name</label>
                  <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">Email Address</label>
                  <input type="email" class="form-control" placeholder="Enter your email">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Subject</label>
                <input type="text" class="form-control" placeholder="Subject">
              </div>

              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="5" placeholder="Write your message"></textarea>
              </div>

              <button type="submit" class="btn btn-custom px-4 py-2">
                Send Message
              </button>
            </form>
          </div>
        </div>

        <!-- Contact Info -->
        <div class="col-lg-5">
          <div class="contact-info shadow">
            <h4>Get in Touch</h4>
            <p><strong>Address:</strong><br> Kolkata, India</p>
            <p><strong>Phone:</strong><br> +91 8172097296</p>
            <p><strong>Email:</strong><br> rahiulsekh539@gmail.com</p>
            <p><strong>Working Hours:</strong><br> Mon - Sun : 9:00 AM - 10:00 PM</p>
          </div>
        </div>

      </div>

      <!-- Map -->
      <div class="map-container mt-5">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3683.847969760189!2d88.363895!3d22.572646!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a0277b1f6f0c6d3%3A0x1f7e45b3b7d7c9d8!2sKolkata!5e0!3m2!1sen!2sin!4v1610000000000"
          allowfullscreen="" loading="lazy">
        </iframe>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p class="mb-0">© 2026 Foodies. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
